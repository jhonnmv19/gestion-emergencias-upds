<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGEU - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h2>Sistema de Emergencias</h2>
        <p class="subtitle">Universidad Privada Domingo Savio</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@upds.edu.bo">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="btn-primary">Ingresar al Sistema</button>
            <div id="errorMessage" class="error-msg"></div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/controllers/authController.js"></script>
</body>
</html>
